name: ondk android build

on:
  workflow_dispatch:

jobs:
  android-arm64-api34:
    name: Build Android 14 (API 34 arm64-v8a)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          # Update package index
          sudo apt-get update

          # Install Java 17 (required for Android SDK tools class 61)
          sudo apt-get install -y openjdk-17-jdk wget unzip

      - name: Verify Java version
        run: |
          # Print Java version to ensure SDK compatibility
          java -version

      - name: Setup Android SDK + NDK
        run: |
          # Create Android SDK directory
          mkdir -p $HOME/android-sdk

          # Move into SDK directory
          cd $HOME/android-sdk

          # Download Android command line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          # Extract command line tools
          unzip commandlinetools-linux-*.zip

          # Fix expected directory structure
          mkdir -p cmdline-tools/latest

          # Move extracted tools into correct location
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

          # Install platform tools, API 34, build tools and NDK
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264"

      - name: Configure environment
        run: |
          # Export Android SDK root
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV

          # Add SDK tools to PATH
          echo "PATH=$PATH:$HOME/android-sdk/platform-tools:$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV

      - name: Build Android (arm64-v8a, API 34)
        run: |
          # Set Android environment variables
          export ANDROID_HOME=$HOME/android-sdk

          # Set Android NDK path
          export ANDROID_NDK_HOME=$HOME/android-sdk/ndk/26.3.11579264

          # Target architecture
          export ANDROID_ABI=arm64-v8a

          # Target API level (Android 14)
          export ANDROID_API=34

          # Run project build script (must support Android NDK build)
          ./build.sh android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.apk
          archive: false
