name: ondk android ndk-only build

on:
  workflow_dispatch:

jobs:
  android-arm64-api34:
    name: Build Android 14 (arm64-v8a) NDK-only
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          # Update package index
          sudo apt-get update

          # Install minimal required tools (no Android SDK)
          sudo apt-get install -y wget unzip cmake ninja-build

      - name: Download Android NDK (standalone)
        run: |
          # Create workspace directory for NDK
          mkdir -p $HOME/android-ndk

          # Move into workspace
          cd $HOME/android-ndk

          # Download Android NDK r26 LTS (stable for API 34)
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip

          # Extract NDK
          unzip android-ndk-r26d-linux.zip

      - name: Set environment
        run: |
          # Define NDK root path
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r26d" >> $GITHUB_ENV

          # Define ABI target
          echo "ANDROID_ABI=arm64-v8a" >> $GITHUB_ENV

          # Define API level (Android 14)
          echo "ANDROID_PLATFORM=android-34" >> $GITHUB_ENV

      - name: Configure CMake (Android toolchain)
        run: |
          # Create build directory
          mkdir -p build
          cd build

          # Configure CMake for Android using NDK toolchain file
          cmake .. -G Ninja -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-34 -DCMAKE_BUILD_TYPE=Release
