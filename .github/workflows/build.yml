name: ondk build

on:
  workflow_dispatch:

jobs:
  linux:
    name: Build for Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Clean up storage
        run: |
          # Remove preinstalled Java and toolchains to free disk space
          sudo rm -rf \
            "$JAVA_HOME_8_X64" "$JAVA_HOME_11_X64" "$JAVA_HOME_17_X64" "$JAVA_HOME_21_X64" \
            "$CHROMEWEBDRIVER" "$EDGEWEBDRIVER" "$GECKOWEBDRIVER" \
            /usr/local/lib/android

      - name: Build toolchain
        run: |
          # Update package list
          sudo apt-get update

          # Install build dependencies
          sudo apt-get -y install cmake ninja-build libzstd-dev binutils-dev wget

          # Install LLVM 20 toolchain
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20

          # Install libc++ for LLVM 20
          sudo apt-get -y install libc++-20-dev libc++abi-20-dev

          # Remove installer script
          rm llvm.sh

          # Run project build
          ./build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.tar.xz
          archive: false

  windows:
    name: Build for Windows
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: make diffutils tar patch unzip gzip python
          pacboy: >
            7zip:p cmake:p gcc:p ninja:p zstd:p clang:p lld:p libc++:p

      - name: Build toolchain
        run: bash build-windows.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist\*.tar.xz
          archive: false

  android-arm64-api34:
    name: Build for Android 14 (API 34 arm64-v8a)
    runs-on: ubuntu-22.04

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install JDK + dependencies
        run: |
          # Update package list
          sudo apt-get update

          # Install Java (required for Android SDK tools)
          sudo apt-get install -y openjdk-17-jdk wget unzip

      - name: Setup Android SDK
        run: |
          # Create SDK directory
          mkdir -p $HOME/android-sdk

          # Download commandline tools
          cd $HOME/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          # Extract tools
          unzip commandlinetools-linux-*.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

          # Accept licenses and install platform tools
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264"

      - name: Configure environment
        run: |
          # Set Android environment variables
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/platform-tools:$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV

      - name: Build Android (arm64-v8a, API 34)
        run: |
          # Export Android build variables
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_NDK_HOME=$HOME/android-sdk/ndk/26.3.11579264

          # Set ABI + API level
          export ANDROID_ABI=arm64-v8a
          export ANDROID_API=34

          # Run project build (expects Android-aware CMake/toolchain inside build.sh)
          ./build.sh android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.apk
          archive: false

  macos-x64-llvm:
    name: Build LLVM for macOS (x64)
    runs-on: macos-26-intel
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build LLVM
        run: |
          brew reinstall ninja zstd binutils gpatch
          ./build.sh clone-llvm build-llvm
          rm -rf out/llvm/build
          mkdir tmp
          tar c out/llvm | xz --x86 --lzma2 > tmp/llvm.x64.tar.xz

      - name: Upload LLVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-llvm
          path: tmp/*.tar.xz          rm llvm.sh
          ./build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.tar.xz
          archive: false

  windows:
    name: Build for Windows
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: make diffutils tar patch unzip gzip python
          pacboy: 7zip:p cmake:p gcc:p ninja:p zstd:p clang:p lld:p libc++:p

      - name: Build toolchain
        run: bash build-windows.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist\*.tar.xz
          archive: false

  macos-x64-llvm:
    name: Build LLVM for macOS (x64)
    runs-on: macos-26-intel

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build LLVM
        run: |
          brew reinstall ninja zstd binutils gpatch
          ./build.sh clone-llvm build-llvm
          rm -rf out/llvm/build
          mkdir tmp
          tar c out/llvm | xz --x86 --lzma2 > tmp/llvm.x64.tar.xz

      - name: Upload LLVM artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-llvm
          path: tmp/*.tar.xz

  macos-x64:
    name: Build for macOS (x64)
    runs-on: macos-26-intel
    needs: [macos-x64-llvm]

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Download LLVM artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-x64-llvm
          path: tmp

      - name: Build toolchain
        run: |
          xz -d < tmp/llvm.x64.tar.xz | tar x
          rm tmp/llvm.x64.tar.xz
          brew reinstall ninja zstd binutils gpatch
          ./build.sh clone build-rust collect
          tar c out/collect | xz --x86 --lzma2 > tmp/out.x64.tar.xz

      - name: Remove LLVM artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: macos-x64-llvm
          failOnError: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64
          path: tmp/*.tar.xz

  macos-arm64:
    name: Build for macOS (arm64)
    runs-on: macos-26

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build toolchain
        run: |
          brew reinstall ninja zstd binutils gpatch
          ./build.sh clone build collect
          mkdir tmp
          tar c out/collect | xz > tmp/out.arm64.tar.xz

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: tmp/*.tar.xz

  macos:
    name: Build for macOS (Universal)
    runs-on: macos-26
    needs: [macos-x64, macos-arm64]

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-x64
          path: tmp

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64
          path: tmp

      - name: Build ONDK
        run: ./dist-macos.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.tar.xz
          archive: false

      - name: Remove x64 artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: macos-x64
          failOnError: false

      - name: Remove arm64 artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: macos-arm64
          failOnError: false
